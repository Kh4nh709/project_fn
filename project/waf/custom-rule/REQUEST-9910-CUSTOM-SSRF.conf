# ============================================================
# Custom SSRF Protection Rules
# Block SSRF attempts on profile image URL upload endpoint
# ============================================================

# Rule 9010: Block SSRF - localhost and loopback addresses
SecRule REQUEST_URI "@beginsWith /profile/image/url" \
    "id:9010, \
    phase:2, \
    chain, \
    deny, \
    status:403, \
    log, \
    msg:'SSRF: Internal host detected in imageUrl', \
    logdata:'imageUrl value: %{MATCHED_VAR}'"
    SecRule ARGS:imageUrl "@rx (?i)(?:localhost|127\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|0\.0\.0\.0|::1)" \
        "t:urlDecodeUni"

# Rule 9011: Block SSRF - Private IP ranges (10.x, 172.16-31.x, 192.168.x)
SecRule REQUEST_URI "@beginsWith /profile/image/url" \
    "id:9011, \
    phase:2, \
    chain, \
    deny, \
    status:403, \
    log, \
    msg:'SSRF: Private IP range detected in imageUrl', \
    logdata:'imageUrl value: %{MATCHED_VAR}'"
    SecRule ARGS:imageUrl "@rx (?i)(?:10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(?:1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}|192\.168\.[0-9]{1,3}\.[0-9]{1,3}|169\.254\.[0-9]{1,3}\.[0-9]{1,3})" \
        "t:urlDecodeUni"

# Rule 9012: Block SSRF - Dangerous protocols (file, dict, gopher, ftp, sftp)
SecRule REQUEST_URI "@beginsWith /profile/image/url" \
    "id:9012, \
    phase:2, \
    chain, \
    deny, \
    status:403, \
    log, \
    msg:'SSRF: Dangerous protocol detected in imageUrl', \
    logdata:'imageUrl value: %{MATCHED_VAR}'"
    SecRule ARGS:imageUrl "@rx (?i)^(?:file|dict|gopher|ftp|sftp|ldap|tftp|netdoc):\/\/" \
        "t:urlDecodeUni"

# Rule 9013: Block SSRF - Internal Docker service hostnames
SecRule REQUEST_URI "@beginsWith /profile/image/url" \
    "id:9013, \
    phase:2, \
    chain, \
    deny, \
    status:403, \
    log, \
    msg:'SSRF: Internal service hostname detected in imageUrl', \
    logdata:'imageUrl value: %{MATCHED_VAR}'"
    SecRule ARGS:imageUrl "@rx (?i)\/\/(?:waf|juice.?shop|backend|internal|api|admin|db|redis|mongo|mysql|postgres)[\/:\s]" \
        "t:urlDecodeUni"
