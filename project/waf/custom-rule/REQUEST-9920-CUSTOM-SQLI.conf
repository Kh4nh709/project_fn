# ============================================================
# Custom SQL Injection Detection Rules - Full Coverage
# Covers: Classic, Boolean, UNION, Time-based, Error-based,
#         Stacked queries, Comment bypass, Encoding bypass
# ============================================================

# Rule 9020: libinjection engine - catch-all SQLi fingerprint
SecRule ARGS "@detectSQLi" \
    "id:9020, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls, \
    log, \
    msg:'SQLi detected via libinjection', \
    logdata:'Param: %{MATCHED_VAR_NAME} | Payload: %{MATCHED_VAR}'"

# Rule 9021: UNION-based SQLi
# Covers: UNION SELECT, UNION ALL SELECT, UNION(SELECT)
SecRule ARGS "@rx (?i)union[\s\S]{0,20}select" \
    "id:9021, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeWhitespace,t:removeNulls, \
    log, \
    msg:'SQLi: UNION SELECT detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9022: Boolean-based SQLi
# Covers: ' OR '1'='1, ' OR 1=1, 1' AND '1'='1, OR TRUE
SecRule ARGS "@rx (?i)(?:'[\s]*(?:or|and|not|xor)[\s]*(?:'|[\d])|[\s]+(?:or|and)[\s]+[\d]+=[\d]+|[\s]+(?:or|and)[\s]+'[^']*'='[^']*'|[\s]+(?:or|and)[\s]+true|[\s]+(?:or|and)[\s]+false)" \
    "id:9022, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Boolean bypass detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9023: Time-based blind SQLi
# Covers: sleep(), waitfor delay, benchmark(), pg_sleep()
SecRule ARGS "@rx (?i)(?:sleep[\s]*\([\s]*[\d]+|waitfor[\s]+delay[\s]*'|benchmark[\s]*\([\s]*[\d]+|pg_sleep[\s]*\(|dbms_pipe\.receive_message)" \
    "id:9023, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Time-based blind injection detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9024: Error-based SQLi
# Covers: extractvalue(), updatexml(), exp(), floor(rand()), convert()
SecRule ARGS "@rx (?i)(?:extractvalue[\s]*\(|updatexml[\s]*\(|exp[\s]*\([\s]*~|floor[\s]*\([\s]*rand|geometrycollection[\s]*\([\s]*null|polygon[\s]*\([\s]*null|multipoint[\s]*\([\s]*null|linestring[\s]*\()" \
    "id:9024, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Error-based injection detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9025: Stacked queries / Batch SQLi
# Covers: ; DROP, ; INSERT, ; UPDATE, ; DELETE, ; EXEC
SecRule ARGS "@rx (?i);[\s]*(?:drop[\s]+(?:table|database|index)|insert[\s]+into|update[\s]+\w+[\s]+set|delete[\s]+from|exec(?:ute)?[\s]*(?:\(|[\s]+\w+))" \
    "id:9025, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Stacked query detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9026: SQL Comment injection + bypass techniques
# Covers: --, #, /**/, /*!50000...*/
SecRule ARGS "@rx (?i)(?:--[\s\r\n]|--$|#[\s\r\n]|\/\*[\s\S]*?\*\/|\/\*![0-9]*)" \
    "id:9026, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: SQL comment injection detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9027: Information gathering SQLi
# Covers: information_schema, sys.tables, xp_cmdshell, load_file, into outfile
SecRule ARGS "@rx (?i)(?:information_schema|sys\.(?:tables|columns|databases)|xp_cmdshell|load_file[\s]*\(|into[\s]+(?:dumpfile|outfile)|from[\s]+(?:dual|information_schema))" \
    "id:9027, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Information gathering attempt detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9028: Hex/Char encoding bypass
# Covers: 0x41414141, char(65), unhex(), convert(... using)
SecRule ARGS "@rx (?i)(?:0x[0-9a-f]{4,}|char[\s]*\([\s]*[\d]+|unhex[\s]*\(|0x[0-9a-f]+[\s]*(?:or|and|union))" \
    "id:9028, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Hex/Char encoding bypass detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9029: Out-of-band SQLi
# Covers: load_file(//attacker.com), dns exfiltration
SecRule ARGS "@rx (?i)(?:load_file[\s]*\([\s]*['\"][\s]*\/\/|into[\s]+outfile[\s]*['\"]\/\/|utl_http|utl_file|dbms_ldap)" \
    "id:9029, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:removeNulls, \
    log, \
    msg:'SQLi: Out-of-band exfiltration attempt detected', \
    logdata:'Payload: %{MATCHED_VAR}'"

# ============================================================
# Login endpoint SQLi protection
# Target: POST /rest/user/login - JSON body fields
# ModSecurity parses JSON as ARGS:json.email, ARGS:json.password
# ============================================================

# Rule 9030: SQLi via libinjection trong email/password của login
SecRule REQUEST_URI "@rx ^/rest/user/login$" \
    "id:9030, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'SQLi in login credentials (libinjection)'"
    SecRule ARGS:json.email|ARGS:json.password "@detectSQLi" \
        "t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls, \
        logdata:'Field: %{MATCHED_VAR_NAME} | Payload: %{MATCHED_VAR}'"

# Rule 9031: SQLi qua pattern phổ biến trong login
# Covers: admin'-- , ' OR 1=1, UNION SELECT, ' OR '1'='1
SecRule REQUEST_URI "@rx ^/rest/user/login$" \
    "id:9031, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'SQLi pattern in login credentials'"
    SecRule ARGS:json.email|ARGS:json.password "@rx (?i)(?:'[\s]*(?:--|#|\/\*)|union[\s\S]{0,20}select|'[\s]*(?:or|and)[\s]*'|[\s]+(?:or|and)[\s]+[\d]+=[\d]+|;[\s]*(?:drop|insert|update|delete|exec))" \
        "t:none,t:urlDecodeUni,t:removeNulls, \
        logdata:'Field: %{MATCHED_VAR_NAME} | Payload: %{MATCHED_VAR}'"
